services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism_local_password
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - prism-postgres-data:/var/lib/postgresql/data

volumes:
  prism-postgres-data:
