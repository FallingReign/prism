# Prism Slack app manifest template.
# Replace bracketed placeholders only inside Slack App Management; do not commit exported app IDs or secrets.
_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Prism
  description: Internal Slack-compatible bridge for developer-owned local tools.
  background_color: "#111111"

features:
  bot_user:
    display_name: Prism
    always_online: false

oauth_config:
  redirect_urls:
    # Local Next.js development callback expected by the future issue #4 OAuth route.
    - http://localhost:3732/v1/slack/oauth/callback
    # Pilot host VM callback for browser-based Slack OAuth testing.
    - http://10.62.240.10:3732/v1/slack/oauth/callback
    # HTTPS development tunnel placeholder if Slack/admin policy rejects localhost HTTP.
    - https://<dev-tunnel-host>/v1/slack/oauth/callback
    # Hosted environment placeholder. Replace with the approved internal Prism hostname.
    - https://<prism-hostname>/v1/slack/oauth/callback
    # Alternative hosted placeholder if the organization reserves an internal domain pattern.
    - https://prism.<internal-domain>/v1/slack/oauth/callback
  scopes:
    # User scopes are REQUIRED - app acts on behalf of individual users
    user:
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history
      - chat:write
      - reactions:read
      - reactions:write
      - search:read
      - files:read
      - users:read
    # Bot scopes are OPTIONAL - only needed for workspace-wide capabilities
    # Comment out or remove bot section if not needed
    bot:
      - channels:read
      - channels:history
      - groups:read
      - groups:history
      - im:read
      - im:history
      - mpim:read
      - mpim:history
      - chat:write
      - reactions:read
      - reactions:write
      - files:read
      - users:read

settings:
  # Dev pilot targets org-ready behavior so Enterprise Grid issues surface early.
  org_deploy_enabled: true
  # Socket Mode and event delivery are deferred. Do not enable for v1.
  socket_mode_enabled: false
  # Security recommendation for issue #4 OAuth custody; confirm in Slack admin review.
  token_rotation_enabled: true
